name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - name: Package VSIX
        run: npx vsce package --out vscode-pi-ext-${{ github.ref_name }}.vsix

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-pi-ext-*.vsix
          generate_release_notes: true

      # Optional: publish to the VS Code Marketplace when VSCE_PAT is set.
      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: npx vsce publish --packagePath vscode-pi-ext-*.vsix

      # Optional: publish to Open VSX (Cursor/VSCodium/Windsurf) when OVSX_PAT is set.
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx ovsx publish vscode-pi-ext-*.vsix -p "$OVSX_PAT"
